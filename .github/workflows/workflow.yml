name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build \
          -t k2009dutta/flask-k8s-cicd-demo:${{ github.sha }} \
          -t k2009dutta/flask-k8s-cicd-demo:latest \
          .
    - name: Push Docker Image
      run: |
        docker push k2009dutta/flask-k8s-cicd-demo:${{ github.sha }}
        docker push k2009dutta/flask-k8s-cicd-demo:latest