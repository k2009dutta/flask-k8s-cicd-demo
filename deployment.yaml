apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-k8s-demo
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: flask-k8s-demo
  template:
    metadata:
      labels:
        app: flask-k8s-demo
    spec:
      containers:
      - name: flask-k8s-demo
        image: k2009dutta/flask-k8s-demo:v1
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flask-k8s-demo
spec:
  type: NodePort
  selector:
    app: flask-k8s-demo
  ports:
  - port: 5000
    targetPort: 5000